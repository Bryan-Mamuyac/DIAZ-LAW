<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Navy rounded square background -->
  <rect width="32" height="32" rx="7" fill="#0A1628"/>

  <!-- Gold scale icon, centered -->
  <!-- Vertical pillar -->
  <rect x="15.4" y="8.5" width="1.2" height="15" rx="0.6" fill="#C9A84C"/>

  <!-- Horizontal top bar -->
  <rect x="9" y="8.5" width="14" height="1.2" rx="0.6" fill="#C9A84C"/>

  <!-- Base stand -->
  <rect x="11.5" y="23.5" width="9" height="1.4" rx="0.7" fill="#C9A84C"/>
  <rect x="14.5" y="22.2" width="3" height="1.5" rx="0.5" fill="#C9A84C"/>

  <!-- Left arm chain -->
  <line x1="10.5" y1="9.7" x2="8.5" y2="15.5" stroke="#C9A84C" stroke-width="1" stroke-linecap="round"/>
  <!-- Right arm chain -->
  <line x1="21.5" y1="9.7" x2="23.5" y2="15.5" stroke="#C9A84C" stroke-width="1" stroke-linecap="round"/>

  <!-- Left pan (arc) -->
  <path d="M6.5,15.5 Q8,19 10.5,15.5" stroke="#C9A84C" stroke-width="1.1" stroke-linecap="round" fill="none"/>
  <!-- Right pan (arc) -->
  <path d="M21.5,15.5 Q24,19 25.5,15.5" stroke="#C9A84C" stroke-width="1.1" stroke-linecap="round" fill="none"/>
</svg>
